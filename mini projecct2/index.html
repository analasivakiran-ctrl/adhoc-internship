<!DOCTYPE html>
<html>
<head>
    <title>Personal Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Todo List</h1>

    <div class="add-task">

        <input
        type="text"
        id="taskInput"
        placeholder="Enter Task">

        <button onclick="addTask()">
            Add
        </button>

    </div>

    <div class="filters">

        <button onclick="filterTasks('all')">
            All
        </button>

        <button onclick="filterTasks('active')">
            Active
        </button>

        <button onclick="filterTasks('completed')">
            Completed
        </button>

    </div>

    <ul id="taskList"></ul>

    <button class="delete-all"
    onclick="deleteCompleted()">

        Delete Completed

    </button>

</div>

<script src="script.js"></script>

</body>
</html>
